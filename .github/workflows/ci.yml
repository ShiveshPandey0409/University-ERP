name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp_dev_password
          POSTGRES_DB: erp_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U erp"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://erp:erp_dev_password@localhost:5432/erp_test?schema=public
      TEST_DATABASE_URL: postgresql://erp:erp_dev_password@localhost:5432/erp_test?schema=public
      REDIS_URL: redis://localhost:6379
      TEST_REDIS_URL: redis://localhost:6379/1
      JWT_ACCESS_SECRET: ci-secret-at-least-16-characters-long
      API_INTERNAL_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Workspace libs must be built to dist before api/web typecheck + build.
      - run: pnpm --filter @erp/shared build
      - run: pnpm --filter @erp/db build

      - name: Typecheck API
        run: pnpm --filter @erp/api exec tsc --noEmit

      - name: Unit tests
        run: |
          pnpm --filter @erp/shared test
          pnpm --filter @erp/api test

      - name: E2E tests (API)
        run: pnpm --filter @erp/api test:e2e

      - name: Build web
        run: pnpm --filter @erp/web build
